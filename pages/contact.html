		<h1>Contato</h1>
		<main>
			<section class="contact-form">
				<div class="form_container">
					<form class="form" id="contact-form">
						<label for="contact-name">Nome Completo</label>
						<input type="text" id="contact-name" name="name" required>
						
						<label for="contact-email">Seu Email</label><br>
						<input type="email" id="contact-email" name="email" required>
						
						<label for="contact-assunto">Assunto</label><br>
						<input type="text" id="contact-assunto" name="assunto" required>

						<label for="contact-message">Deixe Sua Mensagem</label>
						<textarea id="contact-message" name="message" required></textarea>

						<input type="submit" value="ENVIAR">
					</form>
				</div>
			</section>
			<section class="adress">
				<p><strong>Telefone para Contato:</strong> (11) 2359-4800<br>
