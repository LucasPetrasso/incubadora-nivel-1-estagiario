<body>
    <form class="form" id="register-form">
        <div clas="form_container">
            <label for="name">Nome Completo</label><br>
            <input type="text" id="register-name" name="name"><br>

            <label for="email">E-Mail</label><br>
            <input type="email" id="register-email" name="email"><br>

            <label for="pwd">Senha</label><br>
            <input type="password" id="register-pwd" name="pwd"><br>

            <label for="pwdconfirm">Confirme Sua Senha</label><br>
            <input type="password" id="pwdconfirm" name="pwd"><br>

            <label for="checkbox">Li e Aceito os Termos de Uso</label>
            <input type="checkbox" id="register-checkbox" name="checkbox"><br>

            <input type="submit" value="Cadastrar">
        </div>
    </form>
