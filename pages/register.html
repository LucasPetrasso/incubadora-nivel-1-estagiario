    <title>E-commerce - Register | As Melhores Ofertas em Tecnologia</title>

<body>
    <div class="register__form__container">
        <form class="form" id="register-form">
                <label for="name">Nome Completo</label>
                <input type="text" id="register-name" name="name" required>

                <label for="email">E-Mail</label>
                <input type="email" id="register-email" name="email" required>

                <label for="pwd">Senha</label>
                <input type="password" id="register-pwd" name="pwd" required>

                <label for="pwdconfirm">Confirme Sua Senha</label>
                <input type="password" id="pwdconfirm" name="pwd" required>

                <label for="checkbox">Li e Aceito os Termos de Uso</label>
                <input type="checkbox" id="register-checkbox" name="checkbox" required>

                <input type="submit" value="Cadastrar">
        </form> 
    </div>        
</body>
